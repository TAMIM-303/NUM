<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Number Extractor - Color Edition</title>
    <!-- SheetJS Library for Excel Parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- Colorful Gradient Theme --- */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(to right, #ff512f, #dd2476);
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-light: #666666;
            --accent-color: #764ba2;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        /* --- Main Card --- */
        .container {
            width: 100%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.6s ease-out;
            border: 1px solid rgba(255,255,255,0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1rem;
        }

        /* --- Upload Area --- */
        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: var(--border-radius);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: var(--primary-gradient);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .upload-area:hover::before {
            transform: scaleX(1);
        }

        .upload-icon {
            font-size: 4rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            display: block;
        }

        #fileInput {
            display: none;
        }

        /* --- Controls --- */
        .controls {
            margin-top: 30px;
            display: none; /* Hidden initially */
            background: #fff;
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid #eee;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-main);
            background-color: #fff;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        /* --- Preview Area --- */
        .preview-area {
            margin-top: 25px;
            display: none;
        }

        .stats {
            background: #edf2f7;
            color: #2d3748;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
        }

        textarea {
            width: 100%;
            height: 180px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            background: #fafafa;
            color: #2d3748;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-color);
            background: #fff;
        }

        /* --- Action Buttons --- */
        .actions {
            margin-top: 25px;
            display: none;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Poppins', sans-serif;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-copy {
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        .btn-copy:hover {
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
            transform: translateY(-2px);
        }

        .btn-download {
            background: var(--secondary-gradient);
            box-shadow: 0 4px 15px rgba(221, 36, 118, 0.3);
        }

        .btn-download:hover {
            box-shadow: 0 6px 20px rgba(221, 36, 118, 0.5);
            transform: translateY(-2px);
        }

        /* --- Toast Notification --- */
        #toast {
            visibility: hidden;
            min-width: 300px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-size: 0.95rem;
            font-weight: 500;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>✨ Smart Number Extractor</h1>
            <div class="subtitle">এক্সেল বা CSV থেকে সহজে নম্বার বের করুন</div>
        </header>

        <main>
            <!-- Upload Section -->
            <div class="upload-area" id="dropZone">
                <span class="upload-icon">📂</span>
                <h3>ফাইল সিলেক্ট করুন</h3>
                <p style="color: #888; margin-top: 8px; font-size: 0.9rem;">Supported: .csv, .xlsx, .xls</p>
                <input type="file" id="fileInput" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
            </div>

            <!-- Column Selection -->
            <div class="controls" id="controlsArea">
                <div class="control-group">
                    <label>নম্বার কোন কলামে আছে? (যেমন: Column D)</label>
                    <select id="columnSelect">
                        <option value="" disabled selected>ফাইল আপলোড করুন...</option>
                    </select>
                </div>
            </div>

            <!-- Results -->
            <div class="preview-area" id="previewArea">
                <div class="stats" id="statsDisplay">Total Numbers: 0</div>
                <textarea id="resultBox" readonly placeholder="নম্বারগুলো এখানে দেখাবে..."></textarea>
            </div>

            <!-- Buttons -->
            <div class="actions" id="actionButtons">
                <button class="btn btn-copy" id="copyBtn">📋 Copy All</button>
                <button class="btn btn-download" id="downloadBtn">💾 Download .txt</button>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast">Message</div>

    <script>
        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controlsArea = document.getElementById('controlsArea');
        const columnSelect = document.getElementById('columnSelect');
        const previewArea = document.getElementById('previewArea');
        const resultBox = document.getElementById('resultBox');
        const actionButtons = document.getElementById('actionButtons');
        const statsDisplay = document.getElementById('statsDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let extractedData = [];
        let headers = [];
        let currentNumbers = [];

        // --- Events ---
        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', handleFileSelect);

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#764ba2';
            dropZone.style.background = '#fff';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#cbd5e0';
            dropZone.style.background = '#fafafa';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#cbd5e0';
            dropZone.style.background = '#fafafa';
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });

        columnSelect.addEventListener('change', () => {
            extractNumbers(columnSelect.value);
        });

        copyBtn.addEventListener('click', () => {
            if(!currentNumbers.length) return;
            navigator.clipboard.writeText(currentNumbers.join('\n')).then(() => {
                showToast("কপি সফল হয়েছে!");
            });
        });

        downloadBtn.addEventListener('click', () => {
            if(!currentNumbers.length) return;
            const blob = new Blob([currentNumbers.join('\n')], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'extracted_numbers.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("ফাইল ডাউনলোড শুরু হয়েছে...");
        });

        // --- Logic ---

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function getColumnName(num) {
            // 0 -> A, 3 -> D, etc.
            let letters = '';
            while (num >= 0) {
                letters = String.fromCharCode((num % 26) + 65) + letters;
                num = Math.floor(num / 26) - 1;
            }
            return letters;
        }

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;

            if (file.name.endsWith('.csv')) {
                const reader = new FileReader();
                reader.onload = (e) => processCSV(e.target.result);
                reader.readAsText(file);
            } else if (file.name.match(/\.(xls|xlsx)$/)) {
                if(typeof XLSX === 'undefined') {
                    showToast("ইন্টারনেট সংযোগ দরকার!");
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => processExcel(e.target.result);
                reader.readAsBinaryString(file);
            } else {
                showToast("সাপোর্টেড ফাইল দিন (CSV/Excel)");
            }
        }

        function processCSV(csvText) {
            const lines = csvText.split(/\r\n|\n/);
            if (lines.length < 2) return;
            headers = lines[0].split(',').map(h => h.trim());
            extractedData = [];
            for (let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                extractedData.push(lines[i].split(',').map(v => v.trim()));
            }
            populateSelect();
        }

        function processExcel(data) {
            try {
                const workbook = XLSX.read(data, { type: 'binary' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (json.length < 1) return;

                headers = json[0].map(h => (h ? h.toString() : "").trim());
                extractedData = json.slice(1);
                populateSelect();
            } catch (err) {
                console.error(err);
                showToast("ফাইল পড়তে সমস্যা হয়েছে");
            }
        }

        function populateSelect() {
            columnSelect.innerHTML = '';
            
            if (!headers.length) {
                showToast("ফাইলে কোনো ডেটা নেই");
                return;
            }

            // Smart detection for "D" column or Number column
            let targetIndex = -1;

            headers.forEach((header, index) => {
                const colLetter = getColumnName(index);
                const option = document.createElement('option');
                option.value = index;
                // Show "Column A - HeaderName" format
                option.textContent = `Column ${colLetter} ${header ? `(${header})` : ''}`;
                columnSelect.appendChild(option);

                // Auto-detect logic
                let isNumberCol = false;
                const lowerHeader = header.toLowerCase();
                
                if (lowerHeader.includes('number') || lowerHeader.includes('phone') || lowerHeader.includes('mobile')) {
                    isNumberCol = true;
                }
                
                // Specific user request: D column (Index 3)
                if (index === 3) {
                    // Give D column priority if nothing else matches strongly
                    if(targetIndex === -1) targetIndex = index;
                }

                if (isNumberCol) targetIndex = index;
            });

            controlsArea.style.display = 'block';
            
            // Auto select if found
            if (targetIndex !== -1) {
                columnSelect.value = targetIndex;
                extractNumbers(targetIndex);
            } else {
                // Default to Column D (index 3) if exists, else first col
                if (headers.length > 3) {
                    columnSelect.value = 3;
                    extractNumbers(3);
                } else {
                    columnSelect.selectedIndex = 0;
                    extractNumbers(0);
                }
            }
        }

        function extractNumbers(colIndex) {
            colIndex = parseInt(colIndex);
            currentNumbers = [];
            
            extractedData.forEach(row => {
                const val = row[colIndex];
                if (val) {
                    let cleanVal = val.toString().trim();
                    // Remove spaces, quotes
                    cleanVal = cleanVal.replace(/^"|"$/g, '').replace(/\s+/g, '');
                    
                    // Basic check if it looks like a number (length > 5)
                    if (cleanVal.length > 5) {
                        currentNumbers.push(cleanVal);
                    }
                }
            });

            previewArea.style.display = 'block';
            actionButtons.style.display = 'flex';
            resultBox.value = currentNumbers.join('\n');
            statsDisplay.textContent = `Total Numbers Found: ${currentNumbers.length}`;
        }

    </script>
</body>
</html>
